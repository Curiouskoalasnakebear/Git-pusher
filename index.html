<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gist Pusher</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7fff6e;
    --accent-dim: rgba(127,255,110,0.12);
    --accent-glow: rgba(127,255,110,0.25);
    --text: #e8e8f0;
    --muted: #5a5a72;
    --danger: #ff6b6b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 70% 20%, rgba(127,255,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(127,255,110,0.03) 0%, transparent 50%);
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(127,255,110,0.05);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    margin-bottom: 2rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.4rem;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1 {
    font-family: var(--sans);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"],
  input[type="password"],
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .token-actions {
    position: absolute;
    right: 0.6rem;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 0.3rem;
  }

  .btn-tiny {
    background: var(--border);
    border: none;
    border-radius: 4px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .btn-tiny:hover {
    background: var(--accent-dim);
    color: var(--accent);
  }

  #token-input { padding-right: 7rem; }

  .row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    align-items: end;
  }

  textarea {
    resize: vertical;
    min-height: 140px;
    line-height: 1.6;
  }

  .char-count {
    text-align: right;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .btn-push {
    width: 100%;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    padding: 0.9rem;
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
  }

  .btn-push:hover:not(:disabled) {
    box-shadow: 0 0 24px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn-push:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-push:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .status {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.8rem;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .status.success {
    display: block;
    background: var(--accent-dim);
    border: 1px solid rgba(127,255,110,0.3);
    color: var(--accent);
  }

  .status.error {
    display: block;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--danger);
  }

  .status a {
    color: inherit;
    text-decoration: underline;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <h1>Gist Pusher</h1>
    </div>
    <p class="subtitle">Push markdown files to GitHub Gist</p>
  </div>

  <div class="field">
    <label>GitHub Token</label>
    <div class="input-wrap">
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
      <div class="token-actions">
        <button class="btn-tiny" onclick="toggleToken()">show</button>
        <button class="btn-tiny" onclick="clearToken()">clear</button>
      </div>
    </div>
  </div>

  <div class="field">
    <label>Gist ID</label>
    <input type="text" id="gist-id" placeholder="abc123def456...">
  </div>

  <div class="field">
    <label>Filename</label>
    <div class="input-wrap">
      <input type="text" id="filename" placeholder="context" style="padding-right:3rem">
      <span style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem">.md</span>
    </div>
  </div>

  <div class="field">
    <label>Content</label>
    <textarea id="content" placeholder="# My context&#10;&#10;Start writing your markdown here..." oninput="updateCount()"></textarea>
    <div class="char-count"><span id="char-count">0</span> chars</div>
  </div>

  <button class="btn-push" onclick="pushToGist()">Push to Gist</button>

  <div class="status" id="status"></div>
</div>

<script>
  // Load saved values from localStorage on startup
  window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('gist_token');
    const gistId = localStorage.getItem('gist_id');
    const filename = localStorage.getItem('gist_filename');
    if (token) document.getElementById('token-input').value = token;
    if (gistId) document.getElementById('gist-id').value = gistId;
    if (filename) document.getElementById('filename').value = filename;
  });

  // Auto-save token and gist ID as user types
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('token-input').addEventListener('input', e => {
      localStorage.setItem('gist_token', e.target.value);
    });
    document.getElementById('gist-id').addEventListener('input', e => {
      localStorage.setItem('gist_id', e.target.value);
    });
    document.getElementById('filename').addEventListener('input', e => {
      localStorage.setItem('gist_filename', e.target.value);
    });
  });

  function toggleToken() {
    const input = document.getElementById('token-input');
    const btn = document.querySelector('.token-actions .btn-tiny');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = 'hide';
    } else {
      input.type = 'password';
      btn.textContent = 'show';
    }
  }

  function clearToken() {
    document.getElementById('token-input').value = '';
    localStorage.removeItem('gist_token');
  }

  function updateCount() {
    document.getElementById('char-count').textContent =
      document.getElementById('content').value.length;
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = msg;
  }

  async function pushToGist() {
    const token = document.getElementById('token-input').value.trim();
    const gistId = document.getElementById('gist-id').value.trim();
    const filename = (document.getElementById('filename').value.trim() || 'context') + '.md';
    const content = document.getElementById('content').value;

    if (!token) return showStatus('⚠ Please enter your GitHub token.', 'error');
    if (!gistId) return showStatus('⚠ Please enter a Gist ID.', 'error');
    if (!content) return showStatus('⚠ Content cannot be empty.', 'error');

    const btn = document.querySelector('.btn-push');
    btn.disabled = true;
    btn.textContent = 'Pushing...';

    try {
      // Always PATCH to overwrite the existing file in the gist
      const body = { files: { [filename]: { content } } };

      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        showStatus(`✓ Pushed successfully! <a href="${data.html_url}" target="_blank">View gist →</a>`, 'success');
      } else {
        showStatus(`✗ Error: ${data.message || 'Unknown error'}`, 'error');
      }
    } catch (err) {
      showStatus(`✗ Network error: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Push to Gist';
    }
  }
</script>
</body>
</html>
